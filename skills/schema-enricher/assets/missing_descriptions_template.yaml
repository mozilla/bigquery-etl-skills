# Missing Metadata Result File
# Generated by schema-enricher
# Contains two categories:
#   1. missing_columns — descriptions derived from upstream source schema, query context, or derived from application context
#      (not found in any base schema — live or local)
#   2. local_only_base_schema_columns — descriptions sourced from LOCAL-ONLY base schema files
#      (files that exist locally but have NOT been merged to GitHub main)
#
# Review and take appropriate action for each entry.

table: "<project>.<dataset>.<table>"
generated_date: "<YYYY-MM-DD>"

# Section 1: Columns whose descriptions came from upstream source schema, query context, or application context
# (not found in any base schema — live or local)
# For each entry: recommend which base schema file to add it to
missing_columns:
  - name: "<column_name>"
    type: "<BigQuery type>"
    mode: "<NULLABLE|REQUIRED|REPEATED>"
    inferred_description: >-
      <Description derived from upstream source schema, query context, or application/product context.>
    inference_basis: "<column name semantics | related column | product domain | data type signal | query context | upstream source schema>"
    recommended_target: "<global.yaml | app_<name>.yaml | <dataset_name>.yaml>"
    recommendation_reason: >-
      <Why this column belongs in the recommended target.>

# Section 2: Columns matched in LOCAL-ONLY base schema files
# (descriptions are valid but sourced from files not yet on GitHub main)
# For each entry: the source file should be merged to GitHub main
local_only_base_schema_columns:
  - name: "<column_name>"
    type: "<BigQuery type>"
    mode: "<NULLABLE|REQUIRED|REPEATED>"
    description: >-
      <Description sourced from the local-only base schema file.>
    source_file: "<app_<name>.yaml | <dataset_name>.yaml>"
    source_status: "local-only — not on GitHub main"
    recommended_action: >-
      Merge <source_file> to GitHub main to make this description authoritative.

# Summary
# - Columns recommended for global.yaml (upstream schema/query/application context): []
# - Columns recommended for app_<name>.yaml (upstream schema/query/application context): []
# - Columns recommended for <dataset_name>.yaml (upstream schema/query/application context): []
# - Columns from local-only base schemas (need GitHub merge): []
